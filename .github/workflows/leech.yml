name: Leech & Chunk

on:
  repository_dispatch:
    types: [leech_command]

jobs:
  leech-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Download & Split File
        id: process_file
        run: |
          DOWNLOAD_URL="${{ github.event.client_payload.download_url }}"
          DOC_ID="${{ github.event.client_payload.doc_id }}"
          PAYLOAD_FILENAME="${{ github.event.client_payload.filename }}"
          
          echo "Analyzing URL: $DOWNLOAD_URL"
          
          # Create a directory to isolate the download
          mkdir -p leech_download
          cd leech_download
          
          # Download with curl, using -J to let curl determine the filename
          # -L follows redirects
          # -O saves to file
          # -J uses Content-Disposition
          curl -L -J -O "$DOWNLOAD_URL"
          
          # Find the downloaded file (should be the only file in this dir)
          # Use printf to handle spaces/newlines safely
          DOWNLOADED_FILE=$(ls | head -n 1)
          
          echo "Downloaded raw filename: $DOWNLOADED_FILE"
          
          # Determine Final Filename
          if [ -n "$PAYLOAD_FILENAME" ]; then
             FILENAME="$PAYLOAD_FILENAME"
          elif [ -n "$DOWNLOADED_FILE" ]; then
             FILENAME="$DOWNLOADED_FILE"
          else
             # Fallback if curl -J didn't work (e.g. no C-D header and -O used prompt)
             FILENAME="downloaded-content.bin"
          fi
          
          # Sanitize Filename to ensure it is URL-safe and FS-safe
          # Remove accents, weird chars, keep alphanum, dot, dash, underscore
          # This fixes the "gajelas" filename issue
          # Also ensure no quotes to break Content-Disposition in Worker
          CLEAN_FILENAME=$(echo "$FILENAME" | tr -d '"' | tr -d "'" | tr -d '[:cntrl:]') 
          # You might want a stronger sanitizer here, like node script, but basic tr is okay for now
          # Let's use a quick node one-liner for better cleaning if node is available
          CLEAN_FILENAME=$(node -e "console.log(decodeURIComponent(\"${CLEAN_FILENAME}\").replace(/[^a-zA-Z0-9._-]/g, '_').replace(/_+/g, '_'))")
          
          echo "Check sanitized: $CLEAN_FILENAME"
          
          # Rename for processing
          mv "$DOWNLOADED_FILE" "../download.tmp"
          cd ..
          rm -rf leech_download
          
          echo "Final Processing Filename: $CLEAN_FILENAME"
          echo "filename=$CLEAN_FILENAME" >> $GITHUB_OUTPUT

          # 3. Validation
          FILE_MIME=$(file -b --mime-type "download.tmp")
          echo "File Mime Type: $FILE_MIME"
          
          if [[ "$FILE_MIME" == "text/html" ]]; then
             echo "::error::Downloaded file is an HTML page, not a binary. Check your direct link."
             echo "Preview of content:"
             head -n 20 "download.tmp"
             exit 1
          fi

          # Get file size
          TOTAL_SIZE=$(stat -c%s download.tmp)
          echo "Total Size: $TOTAL_SIZE bytes"
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          
          # Split file into 1.9GB chunks
          split -d -b 1900M download.tmp chunk_
          
          ls -l chunk_*

      - name: Create Release & Upload Assets
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DOC_ID="${{ github.event.client_payload.doc_id }}"
          FILENAME="${{ steps.process_file.outputs.filename }}"
          TAG_NAME="leech-${DOC_ID}-$(date +%s)"
          
          echo "Creating release $TAG_NAME for $FILENAME..."
          
          # Create release and upload all chunk files
          gh release create "$TAG_NAME" chunk_* \
            --title "Leech: $FILENAME" \
            --notes "Original URL: ${{ github.event.client_payload.download_url }}"
          
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Get Asset URLs & Update Firestore
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_COLLECTION_NAME: 'files'
          DOC_ID: ${{ github.event.client_payload.doc_id }}
          FILENAME: ${{ steps.process_file.outputs.filename }}
          TOTAL_SIZE: ${{ steps.process_file.outputs.total_size }}
          CHUNK_URLS_FILE: 'chunk_urls.txt'
        run: |
          TAG_NAME="${{ steps.create_release.outputs.tag_name }}"
          
          echo "Fetching asset URLs..."
          # Fetch assets from release, sort by name to ensure order (chunk_00, chunk_01...), and extract URLs
          gh release view "$TAG_NAME" --json assets --jq '.assets | sort_by(.name) | .[].url' > chunk_urls.txt
          
          echo "Found chunk URLs:"
          cat chunk_urls.txt
          
          # Write Service Account to a file to avoid JSON parsing issues with env vars
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json

          # Run the node script to update Firestore
          echo "Updating Firestore..."
          node scripts/update-firestore.js
